{% extends "base.html" %}
{% block title %}Failed | Order #{{ order.id }}{% endblock %}

{% block content %}
<div style="background:#f6f2ea; padding:60px 0;">
  <div class="container" style="max-width:820px;">
    <div style="background:#fff; border:1px solid rgba(0,0,0,.08); border-radius:14px; padding:28px; box-shadow:0 14px 36px rgba(0,0,0,.08);">
      <h1 style="margin:0 0 10px; font-weight:900; letter-spacing:.08em; text-transform:uppercase;">Payment Failed</h1>
      <p style="color:rgba(0,0,0,.65); letter-spacing:.06em; line-height:1.8;">
        Something went wrong for order <b>#{{ order.id }}</b>. You can try again.
      </p>
      <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:14px;">
        <a href="{% url 'orders:stripe_pay' order.id %}" style="padding:12px 16px; border-radius:12px; background:rgba(122,90,26,.95); color:#fff; text-decoration:none; font-weight:900; letter-spacing:.16em; text-transform:uppercase; font-size:11px;">
          Try Again
        </a>
        <a href="{% url 'index' %}" style="padding:12px 16px; border-radius:12px; border:1px solid rgba(0,0,0,.22); color:rgba(0,0,0,.8); text-decoration:none; font-weight:900; letter-spacing:.16em; text-transform:uppercase; font-size:11px;">
          Continue Shopping
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
