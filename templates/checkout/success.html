{% extends "base.html" %}
{% block title %}Success | Order #{{ order.id }}{% endblock %}

{% block content %}
<div style="background:#F7F3EC; padding:60px 0;">
  <div class="container" style="max-width:820px;">
    <div style="background:#fff; border:1px solid rgba(27,22,15,.08); border-radius:14px; padding:28px; box-shadow:0 14px 36px rgba(27,22,15,.08);">
      <h1 style="margin:0 0 10px; font-weight:900; letter-spacing:.08em; text-transform:uppercase;">Payment Successful</h1>
      <p style="color:rgba(27,22,15,.65); letter-spacing:.06em; line-height:1.8;">
        Thanks! Your order <b>#{{ order.id }}</b> has been placed successfully.
      </p>
      <p style="color:rgba(27,22,15,.75); letter-spacing:.06em;"><b>Total:</b> ₹{{ order.total_inr }}</p>
      <a href="{% url 'index' %}" style="display:inline-flex; margin-top:14px; padding:12px 16px; border-radius:12px; background:rgba(122,90,26,.95); color:#fff; text-decoration:none; font-weight:900; letter-spacing:.16em; text-transform:uppercase; font-size:11px;">
        Continue Shopping
      </a>
    </div>
  </div>
</div>
{% endblock %}
